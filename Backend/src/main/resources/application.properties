spring.application.name=sanitary-ware-backend
# Database Configuration
# This handles cases where Render might provide a URL without the jdbc: prefix
spring.datasource.url=${DATASOURCE_URL}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DATASOURCE_USER}
spring.datasource.password=${DATASOURCE_PASSWORD}

# JPA Configuration
# Hibernate 6.x auto-detects MySQL dialect - do NOT set MySQL8Dialect (deprecated)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Actuator - expose health endpoint for Docker & Render health checks
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

# Connection Pool Settings (helps prevent connection drops)
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# Default Hibernate naming strategy used

