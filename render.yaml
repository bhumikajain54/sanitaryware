services:
  - type: web
    name: sanitaryware-backend
    env: docker
    repo: https://github.com/bhumikajain54/sanitaryware
    rootDirectory: Backend
    plan: free
    region: oregon
    envVars:
      - key: DATASOURCE_URL
        sync: false
        placeholder: "jdbc:mysql://your-host:3306/db_name"
      - key: DATASOURCE_USER
        sync: false
      - key: DATASOURCE_PASSWORD
        sync: false
      - key: FRONTEND_URL
        value: "*"
      - key: PORT
        value: "8080"
    healthCheckPath: /actuator/health
